<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/6_salsa_bottle/salsa_bottle.png">
    <title>El Pollo Loco</title>
    <script src="js/classes/drawable-object.class.js"></script>
    <script src="js/classes/movable-object.class.js"></script>
    <script src="js/classes/keyboard.class.js"></script>
    <script src="js/classes/background-object.class.js"></script>
    <script src="js/classes/collectable-object.class.js"></script>
    <script src="js/classes/throwable-object.class.js"></script>
    <script src="js/classes/status-bar.class.js"></script>
    <script src="js/classes/sound-manager.class.js"></script>
    <script src="js/classes/character.class.js"></script>
    <script src="js/classes/chicken.class.js"></script>
    <script src="js/classes/endboss.class.js"></script>
    <script src="js/levels/level1.js"></script>
    <script src="js/classes/world.class.js"></script>
    <script src="js/game.js"></script>

</head>
<body onload="init()">
    <h1 class="home-title">El Pollo Loco</h1>

    <main id="gameShell" class="game-shell">
        <canvas id="gameCanvas" width="720" height="480"></canvas>

        <section id="homeScreen" class="screen home-screen">
        </section>

        <section id="endScreen" class="screen end-screen hidden">
            <img id="resultImage" src="img/You won, you lost/Game Over.png" alt="Game over">
            <div class="button-row">
                <button id="restartButton" class="primary-button" type="button">Restart</button>
                <button id="homeButton" type="button">Home</button>
            </div>
        </section>

        <nav class="mobile-controls" aria-label="Mobile Steuerung">
            <div class="control-group">
                <button data-key="LEFT" type="button" aria-label="Links">&#8592;</button>
                <button data-key="RIGHT" type="button" aria-label="Rechts">&#8594;</button>
            </div>
            <div class="control-group">
                <button data-key="UP" type="button" aria-label="Springen">&#8593;</button>
                <button data-key="THROW" type="button" aria-label="Werfen">F</button>
            </div>
        </nav>
    </main>

    <div class="home-actions">
        <div class="button-row menu-buttons">
            <button id="startButton" class="menu-button menu-start" type="button">
                <img class="menu-button-image" src="img/menue/clean/start.png" alt="">
                <span class="button-label">Start</span>
            </button>
            <button id="helpButton" class="menu-button menu-help" type="button">
                <img class="menu-button-image" src="img/menue/clean/hilfe.png" alt="">
                <span class="button-label">Hilfe</span>
            </button>
            <button id="fullscreenButton" class="menu-button menu-fullscreen" type="button">
                <img class="menu-button-image" src="img/menue/clean/vollbild.png" alt="">
                <span class="button-label">Vollbild</span>
            </button>
            <button id="muteButton" class="menu-button menu-sound" type="button" aria-pressed="false">
                <img class="menu-button-image" src="img/menue/clean/ton.png" alt="">
                <span class="button-label">Ton an</span>
            </button>
        </div>
        <a class="legal-link" href="impressum.html">Impressum</a>
    </div>

    <dialog id="helpDialog" class="help-dialog">
        <button id="closeHelpButton" class="close-button" type="button" aria-label="Schliessen">x</button>
        <h2>Steuerung</h2>
        <p>Laufe mit A/D oder den Pfeiltasten. Springe mit W, Pfeil hoch oder Leertaste. Wirf eine Flasche mit F.</p>
        <p>Sammle Coins und Salsa-Flaschen, besiege Huehner von oben und triff den Endboss mit Flaschen.</p>
    </dialog>

    <div class="orientation-message">
        <p>Bitte drehe dein Geraet ins Querformat.</p>
    </div>
</body>
</html>
